# The same `make check` gate that runs locally (lint + test + guardrails).
# Pin actions to SHAs in production; tags used here for readability.
name: ci
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read   # least privilege

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install
        run: uv sync --extra dev
      - name: make check (lint + test + guardrails)
        run: make check
